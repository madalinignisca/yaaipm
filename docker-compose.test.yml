services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: forgedesk_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d forgedesk_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://testuser:testpass@postgres:5432/forgedesk_test?sslmode=disable", "up"]

  app:
    build:
      context: .
      dockerfile: deploy/Containerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://testuser:testpass@postgres:5432/forgedesk_test?sslmode=disable
      SESSION_SECRET: test-session-secret-32-chars-long!
      AES_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      LISTEN_ADDR: ":8080"
      APP_URL: "http://localhost:8081"
      WEBAUTHN_RPID: "localhost"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 3s
      timeout: 5s
      retries: 10
