apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgedesk-orchestrator
  namespace: smartpm
  labels:
    app: forgedesk
    component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgedesk
      component: orchestrator
  template:
    metadata:
      labels:
        app: forgedesk
        component: orchestrator
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: orchestrator
          image: registry.k3s.vlah.sh/smartpm:v0.3.1
          imagePullPolicy: IfNotPresent
          command: ["orchestrator"]
          envFrom:
            - secretRef:
                name: forgedesk-env
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
