apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgedesk-server
  namespace: smartpm
  labels:
    app: forgedesk
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forgedesk
      component: server
  template:
    metadata:
      labels:
        app: forgedesk
        component: server
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: server
          image: registry.k3s.vlah.sh/smartpm:latest
          command: ["forgedesk"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: forgedesk-env
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
