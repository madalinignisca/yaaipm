{{define "content"}}
<div class="container-medium">
    <h1 class="mb-lg">Account Settings</h1>

    <div class="card mb-lg">
        <h2 class="mb-md">Change Password</h2>
        <form method="POST" action="/account/password">
            <div class="mb-md">
                <label class="form-label" for="current_password">Current Password</label>
                <input type="password" name="current_password" id="current_password" class="form-input" required>
            </div>
            <div class="mb-md">
                <label class="form-label" for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" class="form-input" minlength="12" required>
                <small class="text-muted">Minimum 12 characters</small>
            </div>
            <div class="mb-md">
                <label class="form-label" for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-input" minlength="12" required>
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
    </div>

    <div class="card">
        <h2 class="mb-md">Change Email</h2>
        <form method="POST" action="/account/email">
            <div class="mb-md">
                <label class="form-label">Current Email</label>
                <input type="email" class="form-input" value="{{.User.Email}}" disabled>
            </div>
            <div class="mb-md">
                <label class="form-label" for="new_email">New Email</label>
                <input type="email" name="new_email" id="new_email" class="form-input" required>
            </div>
            <div class="mb-md">
                <label class="form-label" for="email_password">Password</label>
                <input type="password" name="password" id="email_password" class="form-input" required>
                <small class="text-muted">Confirm your identity to change email</small>
            </div>
            <button type="submit" class="btn btn-primary">Update Email</button>
        </form>
    </div>
</div>
{{end}}
