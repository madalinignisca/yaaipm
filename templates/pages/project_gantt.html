{{define "content"}}
{{with .Data}}
{{template "project_tabs" dict "Org" $.Org "Project" .Project "Tab" .Tab}}

<div class="mt-lg">
    <h2 class="mb-md">Timeline</h2>

    {{if .Tickets}}
    <div id="gantt-chart" class="card" style="min-height:400px;overflow-x:auto">
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                if (typeof renderGantt === 'function') {
                    renderGantt('#gantt-chart', {{.Tickets}});
                }
            });
        </script>
    </div>
    {{else}}
    <div class="empty-state">
        <p>No tickets with dates set. Add start/end dates to tickets to see them on the timeline.</p>
    </div>
    {{end}}
</div>
{{end}}
{{end}}
